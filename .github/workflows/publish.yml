name: Publish Package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if [ "$GITHUB_REF_NAME" != "v$PACKAGE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Check if version already exists
        id: published
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.published.outputs.exists != 'true'
        run: npm publish --access public
